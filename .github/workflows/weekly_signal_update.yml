name: Weekly Signal Update
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Weekly observation update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          WGC_COOKIE: ${{ secrets.WGC_COOKIE }}
          V2_RUN_TYPE: weekly
        run: |
          python -m src.update_weekly_signal
          python -m src.v2_data_quality_gate
          python -m src.v2_latest_decision_table
          python -m src.v2_model_update_log
      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
        run: |
          python -m src.notify_feishu --type weekly
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports
          git commit -m "weekly signal update" || echo "No changes"
          git push
