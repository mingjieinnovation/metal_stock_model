name: Daily Metal Stock Model Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch market data
        run: |
          python -m src.fetch_stock
          python -m src.fetch_futures
          python -m src.fetch_macro
      - name: Fetch financial and report data
        run: |
          python -m src.fetch_fundamentals
          python -m src.fetch_announcements
          python -m src.parse_reports
      - name: Build features
        run: python -m src.build_features
      - name: Fit profit models
        run: python -m src.fit_profit_models
      - name: Run backtests
        run: python -m src.backtest_models
      - name: Update valuation report
        run: python -m src.update_daily
      - name: Data quality report
        run: python -m src.data_quality
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports
          git diff --cached --quiet || git commit -m "daily metal model update"
          git push



